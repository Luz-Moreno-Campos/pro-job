<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Kolade & Luz">
    <meta name="description" content="Job finder">
    <meta name="keywords" content="job, search, finder, professional, home">
    <link rel="icon" href="./assets/media/favicon.png?v02" type="image/x-icon">
    <link rel="stylesheet" href="./assets/styles/reset.css" media="all">
    <link rel="stylesheet" href="./assets/styles/home.css" media="all">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="./assets/script/script.js" defer></script>
    <title>ProJob Home Page</title>
  </head>

  <body>
    <header class="header">
      <div class="header-top">
        <div class="header-left">
          <div class="logo">
            <img class="logo-image" src="./assets/media/projob-logo.png" alt="ProJob logo">
          </div>
          <div class="header-search">
            <input type="search" placeholder="Search">
          </div>
        </div>
        <nav class="main-menu">
          <button class="menu-btn">Home</button>
          <button class="menu-btn">Profile</button>
          <button class="menu-btn">Connections</button>
          <button class="menu-btn">Interests</button>
          <button class="menu-btn">Try Premium</button>
        </nav>
        <nav class="icons-menu">
          <button class="header-icon" type="button">
            <span class="icon">
              <i class="fa-solid fa-message"></i>
            </span>
          </button>
          <button class="header-icon" type="button">
            <span class="icon">
              <i class="fa-solid fa-bell"></i>
            </span>
          </button>
          <button class="header-icon" type="button">
            <span class="icon">
              <i class="fa-solid fa-user-plus nav-icon"></i>
            </span>
          </button>
        </nav>
        <div class="profile-photo">
          <span id="header-photo"></span>
        </div>
      </div>
      <div class="header-bottom">
        <nav class="second-menu">
          <button class="second-menu-btn">Posts</button>
          <button class="second-menu-btn">Background</button>
          <button class="second-menu-btn">Recommendations</button>
          <button class="second-menu-btn">Following</button>
        </nav>
      </div>
    </header>
    <main>
      <div class="column" id="left-column">
        <section class="profile-card">
          <div class="profile-header">
            <div class="card-profile-photo">
              <img id="card-photo" src="./assets/media/peter-sorokin-photo.jpg" alt="Profile photo">
            </div>
            <h1 class="profile-name" id="username">Peter Sorokin</h1>
            <p class="profile-title" id="user-title">Software Developer</p>
            <p class="profile-location" id="user-location">New York City, USA</p>
            <button class="profile-btn">Follow</button>
            <button class="profile-btn">Connect</button>
          </div>
          <div class="profile-stats">
            <div class="profile-stat">
              <span class="stat-label">Connections</span>
              <span class="stat-value" id="user-connections">200</span>
            </div>
            <div class="profile-stat">
              <span class="stat-label">Followers</span>
              <span class="stat-value" id="user-followers">1.9M</span>
            </div>
          </div>
          <div class="profile-links">
            <a href="#" class="profile-link" id="user-linkedin">
              <i class="fa-brands fa-linkedin"></i>
              linkedin.com/peter-sorokin
            </a>
            <a href="#" class="profile-link" id="user-website">
              <i class="fa-solid fa-globe"></i>
              www.peter-sorokin.com
            </a>
          </div>
          <button id="export-btn">
            <i class="fa-solid fa-file-pdf"></i>
            Export page as PDF
          </button>
      </div>
    </main>
  </body>
</html>
